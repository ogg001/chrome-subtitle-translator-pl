<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtitle test</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="popup">
    <h1>Subtitle test</h1>

    <section class="section">
      <h2>Status</h2>
      <p><strong>Player:</strong> <span id="player-status">Ładowanie...</span></p>
      <p><strong>Video:</strong> <span id="video-status">Ładowanie...</span></p>
      <p><strong>Kontener napisów:</strong> <span id="caption-status">Ładowanie...</span></p>
    </section>

    <section class="section">
      <h2>Aktualny tekst napisów</h2>
      <p id="caption-text">Ładowanie...</p>
    </section>

    <section class="section">
      <h2>Debug</h2>
      <p id="debug-info">Ładowanie...</p>
    </section>

    <button id="refresh-button" type="button">Odśwież dane</button>
  </main>

  <script src="popup.js"></script>
</body>
</html>
