<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtitle Listener</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="popup">
    <h1>Subtitle Listener</h1>

    <section class="section">
      <h2>Status</h2>
      <p><strong>Listener:</strong> <span id="listener-status">wyłączony</span></p>
      <p><strong>Player:</strong> <span id="player-status">-</span></p>
      <p><strong>Video:</strong> <span id="video-status">-</span></p>
      <p><strong>Napisy:</strong> <span id="caption-status">-</span></p>
      <p><strong>Requesty:</strong> <span id="request-count">0</span></p>
    </section>

    <section class="section">
      <h2>Aktualny tekst napisów</h2>
      <p id="caption-text">Brak danych.</p>
    </section>

    <section class="section">
      <h2>Debug</h2>
      <p id="debug-info">Kliknij „Start listening”.</p>
    </section>

    <div class="toggle-row">
      <span>Debug toasty</span>
      <button id="toast-toggle" class="toggle-button off" type="button">
        OFF
      </button>
    </div>

    <button id="toggle-button" type="button">Start listening</button>
  </main>

  <script src="popup.js"></script>
</body>
</html>
